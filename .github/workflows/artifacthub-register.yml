name: Artifact Hub register

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Register KeiaiLab Helm catalog
        env:
          AH_API_KEY_ID: ${{ secrets.AH_API_KEY_ID }}
          AH_API_KEY_SECRET: ${{ secrets.AH_API_KEY_SECRET }}
        run: bash hack/artifacthub_register.sh
