  mongodb-operator:
  - annotations:
      artifacthub.io/category: database
      artifacthub.io/changes: |
        - kind: security
          description: "MongoDBSearch now drops the auto-created searchCoordinator (search-sync) user from the source on CR deletion via a finalizer. Previously the privileged user was never garbage-collected (no finalizer/dropUser), so deleting a MongoDBSearch left an orphaned searchCoordinator account on the source — a privilege-leak (on sharded clusters it lingered on the config server and every shard). The cleanup drops the user on RS (pod-0) and Sharded (mongos + each shard); it is leak-free (only a deleted source is best-effort skipped — a transient-unavailable source retries) and targets only operator-managed users (identified by the managed-by sync secret, not the current spec value)."
      artifacthub.io/containsSecurityUpdates: 'true'
      artifacthub.io/crds: |
        - kind: MongoDB
          version: v1alpha1
          name: mongodbs.mongodb.keiailab.com
          displayName: MongoDB ReplicaSet
          description: Deploys and manages a MongoDB ReplicaSet cluster
        - kind: MongoDBSharded
          version: v1alpha1
          name: mongodbshardeds.mongodb.keiailab.com
          displayName: MongoDB Sharded Cluster
          description: Deploys and manages a MongoDB Sharded cluster with config servers, shards, and mongos routers
        - kind: MongoDBBackup
          version: v1alpha1
          name: mongodbbackups.mongodb.keiailab.com
          displayName: MongoDB Backup
          description: Creates and manages MongoDB backups to S3 or PVC storage
      artifacthub.io/crdsExamples: |
        - apiVersion: mongodb.keiailab.com/v1alpha1
          kind: MongoDB
          metadata:
            name: my-mongodb
            namespace: database
          spec:
            members: 3
            version:
              version: "8.3.1"
            storage:
              storageClassName: standard
              size: 10Gi
            auth:
              mechanism: SCRAM-SHA-256
              adminCredentialsSecretRef:
                name: mongodb-admin
            monitoring:
              enabled: true
        - apiVersion: mongodb.keiailab.com/v1alpha1
          kind: MongoDBSharded
          metadata:
            name: my-sharded
            namespace: database
          spec:
            version:
              version: "8.3.1"
            configServer:
              members: 3
              storage:
                size: 5Gi
            shards:
              count: 2
              membersPerShard: 3
              storage:
                size: 20Gi
            mongos:
              replicas: 2
        - apiVersion: mongodb.keiailab.com/v1alpha1
          kind: MongoDBBackup
          metadata:
            name: my-backup
            namespace: database
          spec:
            clusterRef:
              name: my-mongodb
              kind: MongoDB
            type: full
            compression: true
            storage:
              type: s3
              s3:
                bucket: mongodb-backups
                endpoint: https://s3.amazonaws.com
                credentialsRef:
                  name: s3-credentials
      artifacthub.io/images: |
        - name: mongodb-operator
          image: ghcr.io/keiailab/mongodb-operator:v1.16.4
        - name: mongodb
          image: mongo:8.3.1
        - name: mongodb-exporter
          image: percona/mongodb_exporter:0.51.0
      artifacthub.io/license: MIT
      artifacthub.io/links: |
        - name: Documentation
          url: https://github.com/keiailab/mongodb-operator/blob/main/README.md
